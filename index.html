<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>세션 홈</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body class="landing-body">
  <div class="landing-wrap">
    <div class="landing-header">
      <h1 class="landing-title">무엇을 할까요?</h1>
      <p class="landing-sub">오늘도 집중하고 성장하는 하루를 만들어보세요.</p>
    </div>
    <div class="landing-cards">
      <a href="focus.html" class="landing-card focus-card">
        <div class="lcard-icon">⏱</div>
        <div class="lcard-info">
          <span class="lcard-title">포커스 세션</span>
          <span class="lcard-desc">공부, 업무, 휴식 시간을 기록하고<br>집중 패턴을 분석해보세요.</span>
        </div>
        <span class="lcard-arrow">→</span>
      </a>
      <a href="stock.html" class="landing-card stock-card">
        <div class="lcard-icon">📈</div>
        <div class="lcard-info">
          <span class="lcard-title">마켓 세션</span>
          <span class="lcard-desc">투자 종목, 수익률, 관심 종목과<br>실현 손익을 한눈에 관리하세요.</span>
        </div>
        <span class="lcard-arrow">→</span>
      </a>
      <a href="weight.html" class="landing-card body-card">
        <div class="lcard-icon">💪</div>
        <div class="lcard-info">
          <span class="lcard-title">바디 세션</span>
          <span class="lcard-desc">식사와 칼로리, 런닝 거리를 기록하고<br>오늘의 바디 밸런스를 확인하세요.</span>
        </div>
        <span class="lcard-arrow">→</span>
      </a>
    </div>
  </div>
</body>
</html>
