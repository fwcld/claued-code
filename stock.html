<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>주식 관리</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app">
    <header>
      <a href="index.html" class="back-btn">← 홈</a>
      <h1 class="stock-title">주식 관리</h1>
    </header>

    <main>
      <!-- 전체 요약 -->
      <section class="card">
        <h2>포트폴리오 요약</h2>
        <div class="stats-grid four-col">
          <div class="stat-box">
            <span class="stat-label">총 투자금액</span>
            <span class="stat-value" id="sum-invested">0원</span>
          </div>
          <div class="stat-box">
            <span class="stat-label">총 평가금액</span>
            <span class="stat-value" id="sum-eval">0원</span>
          </div>
          <div class="stat-box">
            <span class="stat-label">평가손익</span>
            <span class="stat-value" id="sum-pnl">0원</span>
          </div>
          <div class="stat-box">
            <span class="stat-label">실현손익 합계</span>
            <span class="stat-value" id="sum-realized">0원</span>
          </div>
        </div>
      </section>

      <!-- 투자 종목 -->
      <section class="card">
        <h2>투자 종목</h2>
        <div class="stock-input-grid">
          <input type="text"   id="inv-name"    placeholder="종목명" maxlength="20" />
          <input type="number" id="inv-buy"     placeholder="매수가 (원)" min="0" />
          <input type="number" id="inv-qty"     placeholder="수량 (주)" min="1" />
          <input type="number" id="inv-current" placeholder="현재가 (원)" min="0" />
          <button id="inv-add-btn" class="btn-primary">추가</button>
        </div>
        <div class="table-wrap">
          <table class="stock-table" id="inv-table">
            <thead>
              <tr>
                <th>종목명</th>
                <th>매수가</th>
                <th>현재가</th>
                <th>수량</th>
                <th>투자금액</th>
                <th>평가손익</th>
                <th>수익률</th>
                <th></th>
              </tr>
            </thead>
            <tbody id="inv-tbody"></tbody>
          </table>
          <p class="empty-msg" id="inv-empty">투자 종목이 없습니다.</p>
        </div>
      </section>

      <!-- 관심 종목 -->
      <section class="card">
        <h2>관심 종목</h2>
        <div class="stock-input-row">
          <input type="text" id="watch-name" placeholder="종목명" maxlength="20" />
          <input type="text" id="watch-memo" placeholder="메모 (선택)" maxlength="60" />
          <button id="watch-add-btn" class="btn-primary">추가</button>
        </div>
        <ul id="watch-list">
          <li class="empty-msg">관심 종목이 없습니다.</li>
        </ul>
      </section>

      <!-- 실현 손익 (판매 기록) -->
      <section class="card">
        <h2>판매 수익 기록</h2>
        <div class="stock-input-grid">
          <input type="text"   id="sold-name" placeholder="종목명" maxlength="20" />
          <input type="number" id="sold-buy"  placeholder="매수가 (원)" min="0" />
          <input type="number" id="sold-sell" placeholder="매도가 (원)" min="0" />
          <input type="number" id="sold-qty"  placeholder="수량 (주)" min="1" />
          <button id="sold-add-btn" class="btn-primary">추가</button>
        </div>
        <div class="table-wrap">
          <table class="stock-table" id="sold-table">
            <thead>
              <tr>
                <th>종목명</th>
                <th>매수가</th>
                <th>매도가</th>
                <th>수량</th>
                <th>실현손익</th>
                <th>수익률</th>
                <th>날짜</th>
                <th></th>
              </tr>
            </thead>
            <tbody id="sold-tbody"></tbody>
          </table>
          <p class="empty-msg" id="sold-empty">판매 기록이 없습니다.</p>
        </div>
      </section>
    </main>
  </div>

  <script src="stock.js"></script>
</body>
</html>
